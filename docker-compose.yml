services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betabase_php
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_DATABASE: lar_beta_data
      DB_USERNAME: betabase
      DB_PASSWORD: secret
      APP_URL: http://localhost:8080
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:8080
      SESSION_DOMAIN: localhost
    volumes:
      - .:/var/www
      - uploads:/var/www/public/storage
    networks:
      - betabase

  nginx:
    image: nginx:alpine
    container_name: betabase_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - uploads:/var/www/public/storage
    depends_on:
      - php
    networks:
      - betabase

  mysql:
    image: mysql:8.0
    container_name: betabase_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lar_beta_data
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: betabase
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - betabase

networks:
  betabase:
    driver: bridge

volumes:
  dbdata:
    driver: local
  uploads:
    driver: local
