<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Friends</title>
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/friends.css">

        <link rel="manifest" href="/manifest.json">
        <meta name="theme-color" content="#F15025">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="BetaBase">
        <link rel="apple-touch-icon" href="/images/icons/icon-192x192.png">
    </head>
    <body>
        <div id="navbar"></div>

        <div class="maincontent">
            <h1 id="pageTitle">Friends</h1>
            <section class="friendsDiv">
                <h2>Add User</h2>
                <form id="searchForm">
                    <input type="text" id="searchUsername" placeholder="Search by username:" required>
                    <input type="submit" value="Search">
                </form>
                <div id="searchResults"></div>
            </section>

            <section class="friendsDiv">
                <h2>Pending Requests</h2>
                <div id="pendingRequests"></div>
            </section>

            <section class="friendsDiv">
                <h2>Your Friends</h2>
                <div id="friendsList"></div>
            </section>
        </div>

        <script type="module" src="/js/navbar.js"></script>
        <script type="module" src="/js/friends.js"></script>
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .catch(err => console.error('SW registration failed:', err));
            }
        </script>
    </body>
</html>
