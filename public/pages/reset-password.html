<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/css/resetPass.css">
    <link rel="stylesheet" href="/css/global.css">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F15025">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BetaBase">
    <link rel="apple-touch-icon" href="/images/icons/icon-192x192.png">
</head>
<body>
    <div class="maincontent">
        <h2>Reset Password</h2>

        <form id="resetForm">
            <input type="password" id="password" placeholder="New password:" required>
            <input type="password" id="passwordConfirm" placeholder="Confirm new password:" required>
            <input type="submit" value="Reset Password">
        </form>

        <div id="message"></div>
    </div>

    <script src="/js/reset-password.js" type="module"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
