<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/css/login.css">

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginTab = document.getElementById("loginTab");
            const registerTab = document.getElementById("registerTab");
            const loginForm = document.getElementById("loginForm");
            const registerForm = document.getElementById("registerForm");
            const indicator = document.querySelector(".tab-indicator");

            loginTab.addEventListener("click", () => {
                loginTab.classList.add("active");
                registerTab.classList.remove("active");
                loginForm.classList.add("active");
                registerForm.classList.remove("active");
                indicator.style.transform = "translateX(0%)";
            });

            registerTab.addEventListener("click", () => {
                registerTab.classList.add("active");
                loginTab.classList.remove("active");
                registerForm.classList.add("active");
                loginForm.classList.remove("active");
                indicator.style.transform = "translateX(100%)";
            });
        });

    </script>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F15025">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BetaBase">
    <link rel="apple-touch-icon" href="/images/icons/icon-192x192.png">
</head>

<body>

    <div class="maincontent">

        <div class="tab-header">
            <div class="tab-indicator"></div>
            <div class="tab active" id="loginTab">Login</div>
            <div class="tab" id="registerTab">Register</div>
        </div>

        <div class="form-container">
            <form id="loginForm" class="form active">
                <input type="text" id="loginUsername" placeholder="Username:" required>
                <input type="password" id="loginPassword" placeholder="Password:" required>
                <input type="submit" value="Login">
                <a href="/pages/forgot-password.html">Forgot password?</a>
            </form>

            <form id="registerForm" class="form">
                <input type="text" id="regUsername" placeholder="Username:" required>

                <input type="email" id="regEmail" placeholder="Email:" required>

                <input type="password" id="regPassword" placeholder="Password:" required>

                <input type="password" id="regPasswordConfirm" placeholder="Confirm Password:" required>

                <input type="submit" value="Register">
            </form>
        </div>

        <div id="error">
        </div>

    </div>

    <script src="/js/login.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>

</html>
