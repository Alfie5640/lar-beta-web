<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/css/global.css">
        <link rel="stylesheet" href="/css/profile.css">

        <link rel="manifest" href="/manifest.json">
        <meta name="theme-color" content="#F15025">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="apple-mobile-web-app-title" content="BetaBase">
        <link rel="apple-touch-icon" href="/images/icons/icon-192x192.png">
    </head>
    <body>
        <div id="navbar"></div>

        <div class="maincontent">
            <div id="topSect">
                <div id="profilePic">
                    <img id="profilePicImg" src="" alt="Profile picture">
                </div>
                <div id="profileName"></div>
            </div>

            <div id="bio">
                <form id="bioForm">
                    <label for="bioInput">Bio</label>
                    <textarea id="bioInput" name="bio" maxlength="500"></textarea>
                    <button type="submit">Save Bio</button>
                </form>
            </div>

            <div id="settings">
                <form id="pictureForm">
                    <label for="pictureInput">Profile picture</label>
                    <input type="file" id="pictureInput" name="profile_picture" accept="image/png, image/jpeg, image/webp">
                    <button type="submit">Upload</button>
                </form>

                <form id="changeUserForm">
                    <label for="username">Change username</label>
                    <input type="text" id="username" name="username">
                    <button type="submit">Submit</button>
                </form>

                <form id="changePasswordForm">
                    <label for="currentPassword">Current password</label>
                    <input type="password" id="currentPassword" name="current_password">

                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" name="password">

                    <label for="newPasswordConfirm">Confirm new password</label>
                    <input type="password" id="newPasswordConfirm" name="password_confirmation">

                    <button type="submit">Change Password</button>
                </form>

                <div class="danger-zone">
                    <h3>Delete Account</h3>
                    <p>This will permanently delete your account and all your data. This cannot be undone.</p>
                    <button id="deleteAccountBtn" type="button">Delete My Account</button>
                </div>
            </div>
        </div>


        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .catch(err => console.error('SW registration failed:', err));
            }
        </script>
    </body>
    <script type="module" src="/js/profile.js"></script>
    <script type="module" src="/js/navbar.js"></script>
</html>
